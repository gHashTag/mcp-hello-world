version: '3'

services:
  mock-server:
    build:
      context: .
      dockerfile: Dockerfile.mock-server
    ports:
      - "8080:8080"
    networks:
      - test-network

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      - mock-server
    networks:
      - test-network
    environment:
      - MCP_SERVER_URL=ws://mock-server:8080
      - MCP_API_KEY=test-api-key

networks:
  test-network:
    driver: bridge 
version: '3.8'

services:
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      - NODE_ENV=test
      - MCP_SERVER_URL=ws://mcp-test:3000
      - MCP_API_KEY=test-api-key
    depends_on:
      - mcp-test

  mcp-test:
    image: modelcontextprotocol/mcp-server:latest
    environment:
      - PORT=3000
      - API_KEY=test-api-key
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3 